<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#f0f2f6"/>
  <rect x="30" y="20" width="740" height="410" rx="10" fill="white" stroke="#ddd" stroke-width="2"/>
  <text x="400" y="55" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#333">Dashboard - 5 Vistas</text>
  <rect x="50" y="75" width="220" height="55" rx="6" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/>
  <text x="160" y="97" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1565C0">Resumen</text>
  <text x="160" y="115" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Tarjetas + sparklines</text>
  <rect x="290" y="75" width="220" height="55" rx="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="400" y="97" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#E65100">Tendencias</text>
  <text x="400" y="115" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">8 indicadores + filtros</text>
  <rect x="530" y="75" width="220" height="55" rx="6" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/>
  <text x="640" y="97" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#6A1B9A">Predicciones</text>
  <text x="640" y="115" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Prophet + ARIMA</text>
  <rect x="50" y="145" width="220" height="55" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="160" y="167" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#2E7D32">Comercio Exterior</text>
  <text x="160" y="185" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Import / Export / Balanza</text>
  <rect x="290" y="145" width="220" height="55" rx="6" fill="#FFEBEE" stroke="#F44336" stroke-width="1"/>
  <text x="400" y="167" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#C62828">Contexto</text>
  <text x="400" y="185" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Deuda + Presupuesto + Socio</text>

  <line x1="50" y1="225" x2="750" y2="225" stroke="#ddd" stroke-width="1"/>

  <text x="400" y="255" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#333">Vista Resumen - Tarjetas</text>
  <rect x="50" y="275" width="120" height="70" rx="5" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/>
  <text x="110" y="298" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1565C0">IMAE</text>
  <text x="110" y="318" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">275.2</text>
  <text x="110" y="335" text-anchor="middle" font-family="Arial" font-size="10" fill="#4CAF50">+3.2% anual</text>
  <rect x="180" y="275" width="120" height="70" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="240" y="298" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#E65100">PIB</text>
  <text x="240" y="318" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">61,631M</text>
  <text x="240" y="335" text-anchor="middle" font-family="Arial" font-size="10" fill="#4CAF50">+2.1% anual</text>
  <rect x="310" y="275" width="120" height="70" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="370" y="298" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2E7D32">Deuda</text>
  <text x="370" y="318" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">59,349M</text>
  <text x="370" y="335" text-anchor="middle" font-family="Arial" font-size="10" fill="#F44336">-0.8% mensual</text>
  <rect x="440" y="275" width="120" height="70" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/>
  <text x="500" y="298" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#6A1B9A">Import.</text>
  <text x="500" y="318" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">1,404M</text>
  <text x="500" y="335" text-anchor="middle" font-family="Arial" font-size="10" fill="#4CAF50">+5.7% anual</text>
  <rect x="570" y="275" width="120" height="70" rx="5" fill="#FFEBEE" stroke="#F44336" stroke-width="1"/>
  <text x="630" y="298" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#C62828">IPC</text>
  <text x="630" y="318" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#333">104.6</text>
  <text x="630" y="335" text-anchor="middle" font-family="Arial" font-size="10" fill="#4CAF50">+0.3% anual</text>

  <text x="400" y="390" text-anchor="middle" font-family="Arial" font-size="11" fill="#999">5 vistas: Resumen | Tendencias | Predicciones | Comercio Exterior | Contexto</text>
  <text x="400" y="410" text-anchor="middle" font-family="Arial" font-size="11" fill="#999">stack: Python, Streamlit, Plotly, Prophet, ARIMA, pandas, CKAN API</text>
</svg>
