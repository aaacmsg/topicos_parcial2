<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f0f2f6"/>
  <rect x="30" y="30" width="740" height="340" rx="10" fill="white" stroke="#ddd" stroke-width="2"/>
  <text x="400" y="80" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#333">Pipeline de Datos - Dashboard de Indicadores Economicos</text>
  <rect x="50" y="120" width="140" height="60" rx="8" fill="#4CAF50" opacity="0.9"/>
  <text x="120" y="148" text-anchor="middle" font-family="monospace" font-size="13" fill="white" font-weight="bold">CKAN API</text>
  <text x="120" y="165" text-anchor="middle" font-family="monospace" font-size="11" fill="white">datosabiertos.gob.pa</text>
  <text x="120" y="195" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">11 datasets</text>
  <line x1="190" y1="150" x2="230" y2="150" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="230" y="120" width="140" height="60" rx="8" fill="#2196F3" opacity="0.9"/>
  <text x="300" y="148" text-anchor="middle" font-family="monospace" font-size="12" fill="white" font-weight="bold">Preprocesamiento</text>
  <text x="300" y="165" text-anchor="middle" font-family="monospace" font-size="11" fill="white">pandas / parquet</text>
  <line x1="370" y1="150" x2="410" y2="150" stroke="#666" stroke-width="2"/>
  <rect x="410" y="120" width="140" height="60" rx="8" fill="#FF9800" opacity="0.9"/>
  <text x="480" y="140" text-anchor="middle" font-family="monospace" font-size="12" fill="white" font-weight="bold">Modelos ML</text>
  <text x="480" y="157" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Prophet (IMAE)</text>
  <text x="480" y="172" text-anchor="middle" font-family="Arial" font-size="11" fill="white">ARIMA (PIB)</text>
  <line x1="550" y1="150" x2="590" y2="150" stroke="#666" stroke-width="2"/>
  <rect x="590" y="120" width="160" height="60" rx="8" fill="#9C27B0" opacity="0.9"/>
  <text x="670" y="148" text-anchor="middle" font-family="monospace" font-size="13" fill="white" font-weight="bold">Dashboard</text>
  <text x="670" y="165" text-anchor="middle" font-family="monospace" font-size="11" fill="white">Streamlit</text>
  <text x="150" y="270" text-anchor="middle" font-family="Arial" font-size="12" fill="#333" font-weight="bold">Datos</text>
  <text x="150" y="290" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">INEC, MEF, Contraloria</text>
  <text x="400" y="270" text-anchor="middle" font-family="Arial" font-size="12" fill="#333" font-weight="bold">Procesamiento</text>
  <text x="400" y="290" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">Limpieza y feature engineering</text>
  <text x="650" y="270" text-anchor="middle" font-family="Arial" font-size="12" fill="#333" font-weight="bold">Visualizacion</text>
  <text x="650" y="290" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">5 vistas interactivas</text>
  <text x="400" y="340" text-anchor="middle" font-family="Arial" font-size="11" fill="#999">python run.py  |  pip install -r requirements.txt  |  streamlit run app.py</text>
</svg>
